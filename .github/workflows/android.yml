name: Android CI

on:
  push:
    branches: [ "main", "prod" ]
  pull_request:
    branches: [ "main", "prod" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        working-directory: app
        run: chmod +x ./gradlew
      - name: checkenvvars
        run: |
          echo "ONEINCH_KEY is ${ONEINCH_KEY:0:4}***"
          echo "OPEN_AI_KEY is ${OPEN_AI_KEY:0:4}***"
        env:
          ONEINCH_KEY: ${{ secrets.ONEINCH_KEY }}
          OPEN_AI_KEY: ${{ secrets.OPEN_AI_KEY }}      
      - name: Get local.properties from secrets
        working-directory: app
        env:
          ONEINCH_KEY: ${{ secrets.ONEINCH_KEY }}
          OPEN_AI_KEY: ${{ secrets.OPEN_AI_KEY }}
        run: |
          echo "oneinch_key=$ONEINCH_KEY" > local.properties
          echo "open_ai_key=$OPEN_AI_KEY" >> local.properties
      - name: Print local.properties
        working-directory: app
        run: cat local.properties
      - name: Build with Gradle
        working-directory: app
        run: ./gradlew assembleRelease
      
      - name: Upload APK (only on prod)
        if: github.ref == 'refs/heads/prod'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release.apk
  
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/prod'
        uses: softprops/action-gh-release@v1
        with:
          name: "Release ${{ github.sha }}"
          tag_name: "v${{ github.run_number }}"
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
